name: Package

on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: "Qt version to install with aqtinstall"
        required: true
        default: "6.5.3"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  QT_VERSION: ${{ github.event.inputs.qt_version || '6.5.3' }}

jobs:
  linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            file \
            libdbus-1-3 \
            libegl-dev \
            libfontconfig1 \
            libfreetype6 \
            libgl-dev \
            libgl1 \
            libglx-dev \
            libopengl-dev \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-util1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxi6 \
            libxkbcommon-x11-0 \
            ninja-build \
            python3-pip

      - name: Install Qt
        run: |
          QT_VERSION="${QT_VERSION:-6.5.3}"
          echo "Installing Qt $QT_VERSION for Linux"
          python3 -m venv "$RUNNER_TEMP/aqt-venv"
          source "$RUNNER_TEMP/aqt-venv/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt linux desktop "$QT_VERSION" gcc_64 \
            -O "$RUNNER_TEMP/Qt" \
            -m qtimageformats
          echo "QT_PREFIX=$RUNNER_TEMP/Qt/$QT_VERSION/gcc_64" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/Qt/$QT_VERSION/gcc_64/bin" >> "$GITHUB_PATH"

      - name: Download AppImage tools
        run: |
          mkdir -p tools
          curl -L --fail -o tools/linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L --fail -o tools/linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          curl -L --fail -o tools/runtime-x86_64 \
            https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64
          chmod +x tools/linuxdeploy-x86_64.AppImage tools/linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build package
        env:
          APPIMAGE_RUNTIME: ${{ github.workspace }}/tools/runtime-x86_64
        run: |
          CMAKE_GENERATOR=Ninja \
          CMAKE_PREFIX_PATH="$QT_PREFIX" \
            scripts/package-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NgImageViewer-linux-x86_64.AppImage
          path: dist/linux/NgImageViewer-x86_64.AppImage
          if-no-files-found: error

  macos:
    name: macOS app
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          brew update
          brew install dylibbundler ninja

      - name: Install Qt
        run: |
          QT_VERSION="${QT_VERSION:-6.5.3}"
          echo "Installing Qt $QT_VERSION for macOS"
          python3 -m venv "$RUNNER_TEMP/aqt-venv"
          source "$RUNNER_TEMP/aqt-venv/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt mac desktop "$QT_VERSION" clang_64 \
            -O "$RUNNER_TEMP/Qt" \
            -m qtimageformats
          echo "QT_PREFIX=$RUNNER_TEMP/Qt/$QT_VERSION/macos" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/Qt/$QT_VERSION/macos/bin" >> "$GITHUB_PATH"

      - name: Build app
        run: |
          cmake -S . -B build/macos-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX" \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build build/macos-release --target NgImageViewer --parallel

      - name: Package app
        run: |
          scripts/package-macos.sh build/macos-release/NgImageViewer.app
          mkdir -p dist/macos
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos-release/NgImageViewer.app \
            dist/macos/NgImageViewer-macos-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NgImageViewer-macos-arm64.zip
          path: dist/macos/NgImageViewer-macos-arm64.zip
          if-no-files-found: error

  windows:
    name: Windows zip
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        shell: pwsh
        run: |
          $QtVersion = if ([string]::IsNullOrWhiteSpace($env:QT_VERSION)) { "6.5.3" } else { $env:QT_VERSION }
          Write-Host "Installing Qt $QtVersion for Windows"
          python -m venv "$env:RUNNER_TEMP\aqt-venv"
          $AqtPython = "$env:RUNNER_TEMP\aqt-venv\Scripts\python.exe"
          & $AqtPython -m pip install --upgrade pip
          & $AqtPython -m pip install aqtinstall
          & $AqtPython -m aqt install-qt windows desktop "$QtVersion" win64_msvc2019_64 `
            -O "$env:RUNNER_TEMP\Qt" `
            -m qtimageformats
          "QT_PREFIX=$env:RUNNER_TEMP\Qt\$QtVersion\msvc2019_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$env:RUNNER_TEMP\Qt\$QtVersion\msvc2019_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\package-windows.ps1 `
            -QtPrefix "$env:QT_PREFIX"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NgImageViewer-windows-x64.zip
          path: dist/windows/NgImageViewer-windows-x64.zip
          if-no-files-found: error

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - linux
      - macos
      - windows
    runs-on: ubuntu-22.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
